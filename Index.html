<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Admin | 2FA Verification Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md border border-gray-200">
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Security Verification</h2>
    <p class="text-sm text-gray-600 mb-6">Demonstrating WhatsApp Business API Integration for OTP and Transactional Alerts.</p>

    <div class="mb-8 p-4 bg-blue-50 rounded-md border border-blue-100">
        <label class="block text-sm font-medium text-blue-800 mb-1">Step 1: Identity Verification</label>
        <input type="text" id="phone" placeholder="+1234567890" class="w-full p-2 border border-gray-300 rounded mb-3 focus:ring-2 focus:ring-blue-500 outline-none">
        <button onclick="sendOTP()" id="otpBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded transition">
            Send OTP via WhatsApp
        </button>
        <p id="otpStatus" class="mt-2 text-xs text-center text-gray-500"></p>
    </div>

    <div class="p-4 bg-green-50 rounded-md border border-green-100">
        <label class="block text-sm font-medium text-green-800 mb-1">Step 2: Transaction Alert</label>
        <button onclick="sendAlert()" id="alertBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded transition">
            Simulate Transaction Alert
        </button>
        <p id="alertStatus" class="mt-2 text-xs text-center text-gray-500"></p>
    </div>

    <div class="mt-6 pt-4 border-t border-gray-100 text-[10px] text-gray-400 uppercase tracking-widest text-center">
        Reviewer Demo Mode Enabled
    </div>
</div>

<script>
    async function sendOTP() {
        const phone = document.getElementById('phone').value;
        const status = document.getElementById('otpStatus');

        if(!phone) return alert("Please enter a phone number");

        // Generate a random 4-digit OTP
        const generatedOtp = Math.floor(1000 + Math.random() * 9000).toString();

        status.innerText = "Sending WhatsApp OTP...";

        try {
            const response = await fetch('https://graph.facebook.com/v22.0/970825012779689/messages', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer EAAR9eiVLRf0BQpU31lDG1sghC4zpdBdO9ZAXG4pIvGE2PcUn7L0LByFCECCXO6wlMAel87d6ZB7ItMa6AnS51vE9sZB3cYpgPEmKWbpfR9esbPV3Hzmp0IlhxntBD11PD6VNMy2hGaXn20unUZCWS7GSM71VG5M3CEKecSMGsUVAR1F3fTBXHcoSBvHsbBaI2jkckDZBAG04gAUIuCxC7iRxcCPugvZBvcZC2h0C9pzg6fZBEzWSBwZA5cGZB97Gimw11NululuzsJy6u2CfPvEGvW',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    "messaging_product": "whatsapp",
                    "recipient_type": "individual",
                    "to": phone, // Uses the variable from your input field
                    "type": "template",
                    "template": {
                        "name": "tingg_engage_otp",
                        "language": {
                            "code": "en"
                        },
                        "components": [
                            {
                                "type": "body",
                                "parameters": [
                                    {
                                        "type": "text",
                                        "text": generatedOtp // The dynamic OTP code
                                    }
                                ]
                            },
                            {
                                "type": "button",
                                "sub_type": "url",
                                "index": "0",
                                "parameters": [
                                    {
                                        "type": "text",
                                        "text": generatedOtp // The same code for the button
                                    }
                                ]
                            }
                        ]
                    }
                })
            });

            const result = await response.json();

            if (response.ok) {
                status.innerText = `Success! OTP (${generatedOtp}) sent to ${phone}`;
                console.log("Meta Response:", result);
            } else {
                status.innerText = "Error: " + (result.error?.message || "Check console");
                console.error("Meta Error:", result);
            }
        } catch (err) {
            status.innerText = "Failed to connect to Meta API.";
            console.error("Fetch Error:", err);
        }
    }

    async function sendAlert() {
        const status = document.getElementById('alertStatus');
        const phone = document.getElementById('phone').value || "254704069085"; // Fallback to your number

        status.innerText = "Triggering Transaction Alert...";

        // Generate dynamic data for a realistic demo
        const randomTxId = "TXN" + Math.floor(Math.random() * 1000000000000);
        const currentTimestamp = new Date().toLocaleString('en-US', {
            month: 'short', day: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
        }).replace(/,/g, '');

        try {
            const response = await fetch('https://graph.facebook.com/v22.0/970825012779689/messages', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer EAAR9eiVLRf0BQpU31lDG1sghC4zpdBdO9ZAXG4pIvGE2PcUn7L0LByFCECCXO6wlMAel87d6ZB7ItMa6AnS51vE9sZB3cYpgPEmKWbpfR9esbPV3Hzmp0IlhxntBD11PD6VNMy2hGaXn20unUZCWS7GSM71VG5M3CEKecSMGsUVAR1F3fTBXHcoSBvHsbBaI2jkckDZBAG04gAUIuCxC7iRxcCPugvZBvcZC2h0C9pzg6fZBEzWSBwZA5cGZB97Gimw11NululuzsJy6u2CfPvEGvW',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    "messaging_product": "whatsapp",
                    "to": phone,
                    "type": "template",
                    "template": {
                        "name": "simbisa_template",
                        "language": {
                            "code": "en"
                        },
                        "components": [
                            {
                                "type": "body",
                                "parameters": [
                                    { "type": "text", "text": "KSH" },
                                    { "type": "text", "text": "3000" },
                                    { "type": "text", "text": randomTxId },
                                    { "type": "text", "text": currentTimestamp }
                                ]
                            }
                        ]
                    }
                })
            });

            const result = await response.json();

            if (response.ok) {
                status.innerText = "Alert Sent Successfully!";
                console.log("Success:", result);
            } else {
                status.innerText = "Error: " + (result.error?.message || "Check console");
                console.error("Meta Error:", result);
            }
        } catch (err) {
            status.innerText = "Failed to connect to Meta API.";
            console.error("Fetch Error:", err);
        }
    }
</script>
</body>
</html>
